# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      force_backend_build:
        description: 'Force backend build'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force_frontend_build:
        description: 'Force frontend build'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          backend:
            - 'src/**'
            - 'pom.xml'
          frontend:
            - 'frontend/**'
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Set up Node.js
      if: github.event.inputs.force_frontend_build == 'true' || steps.filter.outputs.frontend == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '22.14.0'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    - name: Install frontend dependencies
      if: github.event.inputs.force_frontend_build == 'true' || steps.filter.outputs.frontend == 'true'
      run: npm ci
      working-directory: frontend
    - name: Frontend type check
      if: github.event.inputs.force_frontend_build == 'true' || steps.filter.outputs.frontend == 'true'
      run: npm run type-check
      working-directory: frontend
    - name: Frontend lint
      if: github.event.inputs.force_frontend_build == 'true' || steps.filter.outputs.frontend == 'true'
      run: npm run lint
      working-directory: frontend
    - name: Build backend only
      if: github.event.inputs.force_backend_build == 'true' || steps.filter.outputs.backend == 'true'
      run: ./mvnw -B verify --file pom.xml
    - name: Build with frontend
      if: github.event.inputs.force_frontend_build == 'true' || steps.filter.outputs.frontend == 'true'
      run: ./mvnw -B verify -Pwith-frontend --file pom.xml
