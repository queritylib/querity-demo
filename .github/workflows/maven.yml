# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      force_frontend_build:
        description: 'Force frontend build'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:

    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Detect frontend changes
      id: changes
      run: |
        FORCE_BUILD="${{ github.event.inputs.force_frontend_build }}"
        if [[ "$FORCE_BUILD" == "true" ]]; then
          echo "frontend-changed=true" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
          # For PR, compare against the base branch
          if git diff --name-only ${{ github.base_ref }}...HEAD | grep -q '^frontend/'; then
            echo "frontend-changed=true" >> $GITHUB_OUTPUT
          else
            echo "frontend-changed=false" >> $GITHUB_OUTPUT
          fi
        elif [[ "${{ github.event_name }}" == "push" ]]; then
          # For push, compare against the previous commit
          if git diff --name-only HEAD~1 HEAD | grep -q '^frontend/'; then
            echo "frontend-changed=true" >> $GITHUB_OUTPUT
          else
            echo "frontend-changed=false" >> $GITHUB_OUTPUT
          fi
        else
          # For manual dispatch, always build frontend
          echo "frontend-changed=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Set up Node.js
      if: steps.changes.outputs.frontend-changed == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '22.14.0'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    
    - name: Install frontend dependencies
      if: steps.changes.outputs.frontend-changed == 'true'
      run: npm ci
      working-directory: frontend
    
    - name: Frontend type check
      if: steps.changes.outputs.frontend-changed == 'true'
      run: npm run type-check
      working-directory: frontend
    
    - name: Frontend lint
      if: steps.changes.outputs.frontend-changed == 'true'
      run: npm run lint
      working-directory: frontend
    
    - name: Build backend only
      if: steps.changes.outputs.frontend-changed == 'false'
      run: ./mvnw -B verify --file pom.xml
    
    - name: Build with frontend
      if: steps.changes.outputs.frontend-changed == 'true'
      run: ./mvnw -B verify -Pwith-frontend --file pom.xml
